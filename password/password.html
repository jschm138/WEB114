<!--Week 4- Extra Credit- Create a password checker  -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Password Checker</title>
</head>

<style>
	body {
		background: linear-gradient(to bottom, #0b0b2b, #1b2735 70%, #090a0f);
		font-family: "Comic Sans MS", "Comic Sans", cursive;
		min-height: 100vh;
		padding: 20px;
	}
	
	h1, p {
		color: white;
		text-align: center;
	}
</style>

<body>
    <h1>A mysterious code guards a secret message. To unlock it, you must decipher the password's 
	requirements. It must be a mighty password, at least 8 characters strong, with a mix of uppercase 
	and lowercase letters, and a number to boot.</h1>
	<br>
	<p>Check Your message by clicking F12....</p>
	
	<script defer>
		let password = prompt("Enter your password.  Remember to choose wisely, for failure will seal the secret forever!")
		
		let lengthValid = password.length >= 8;
		let upperCase = password.match(/[A-Z]/);
		let lowerCase = password.match(/[a-z]/);
		let hasDigit = password.match(/\d/)
		
		if (lengthValid && upperCase && lowerCase && hasDigit) {
			console.log("The Chamber of Secrets has been opened. Enemies of the heir... beware")
		} else {
			console.log("Access denied... all is lost!")
		}
	</script>
</body>
</html>
